<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">

<!-- Shared head fragment -->
<head th:replace="~{fragments/admin-layout :: head(title='Nový Tým')}"></head>

<body class="admin-body">
<div class="admin-layout">

    <!-- Sidebar fragment -->
    <aside th:replace="~{fragments/admin-layout :: sidebar}"></aside>

    <!-- Main content -->
    <div class="admin-main">

        <!-- Top bar fragment -->
        <header th:replace="~{fragments/admin-layout :: header}"></header>

        <div class="admin-content">
            <div class="admin-list-header">
                <h1 class="admin-page-title"
                    th:text="${tym.id != null} ? 'Upravit tým' : 'Nový tým'">Tým</h1>
                <a th:href="@{/admin/tymy}" class="admin-back-link">← Zpět na seznam</a>
            </div>

            <div class="admin-form-card">
                <form th:action="${tym.id != null} ? '@{/admin/tymy/{id}/edit(id=${tym.id})}' : '@{/admin/tymy/novy}'"
                      method="post">

                    <div class="form-group">
                        <label for="nazev">Název týmu</label>
                        <input type="text" id="nazev" name="nazev"
                               th:value="${tym.nazev}"
                               required placeholder="Název týmu">
                    </div>

                    <div class="form-group">
                        <label for="univerzitaId">Univerzita</label>
                        <select id="univerzitaId" name="univerzitaId" required>
                            <option value="">— Vyberte univerzitu —</option>
                            <option th:each="uni : ${univerzity}"
                                    th:value="${uni.id}"
                                    th:text="${uni.nazev}"
                                    th:selected="${tym.univerzita != null && tym.univerzita.id == uni.id}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group form-group--checkbox">
                        <input type="checkbox" id="aktivni" name="aktivni"
                               th:checked="${tym.aktivni}">
                        <label for="aktivni">Aktivní tým</label>
                    </div>

                    <div class="admin-form-actions">
                        <button type="submit" class="btn">Uložit</button>
                        <a th:href="@{/admin/tymy}" class="btn btn--outline">Zrušit</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
