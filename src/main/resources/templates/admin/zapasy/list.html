<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Týmy | UFoL Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="icon" th:href="@{/images/favicon-ufol.svg}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
<div class="admin-layout">

    <aside class="admin-sidebar">
        <div class="admin-sidebar__brand">
            <img th:src="@{/images/logo.svg}" alt="UFoL" class="admin-sidebar__logo">
            <div>
                <div class="admin-sidebar__title">UFoL</div>
                <div class="admin-sidebar__subtitle">Administrace</div>
            </div>
        </div>
        <nav class="admin-sidebar__nav">
            <a th:href="@{/admin}"
               class="admin-nav__item"
               th:classappend="${activePage == 'dashboard'} ? ' admin-nav__item--active'">
                Přehled
            </a>
            <a th:href="@{/admin/zapasy}"
               class="admin-nav__item"
               th:classappend="${activePage == 'zapasy'} ? ' admin-nav__item--active'">
                Zápasy
            </a>
            <a th:href="@{/admin/tymy}"
               class="admin-nav__item"
               th:classappend="${activePage == 'tymy'} ? ' admin-nav__item--active'">
                Týmy
            </a>
            <a th:href="@{/admin/rocniky}"
               class="admin-nav__item"
               th:classappend="${activePage == 'rocniky'} ? ' admin-nav__item--active'">
                Ročníky
            </a>
        </nav>
    </aside>

    <div class="admin-main">
        <header class="admin-topbar">
            <div class="admin-topbar__user">
                <div class="admin-topbar__avatar">A</div>
                <div>
                    <div class="admin-topbar__name">Admin</div>
                    <div class="admin-topbar__email" th:text="${#authentication.name}">admin@ufol.cz</div>
                </div>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="admin-topbar__logout">Odhlásit se</button>
            </form>
        </header>

        <div class="admin-content">
            <div class="admin-list-header">
                <h1 class="admin-page-title">Zápasy</h1>
                <a th:href="@{/admin/zapasy/novy}" class="btn">+ Přidat zápas</a>
            </div>

            <div th:if="${success}" class="admin-alert admin-alert--success" th:text="${success}"></div>
            <div th:if="${error}" class="admin-alert admin-alert--error" th:text="${error}"></div>

            <h2 class="admin-section-title">Naplánované zápasy</h2>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                    <tr><th>Datum</th><th>Domácí</th><th>Hosté</th><th>Místo</th><th>Akce</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="zapas : ${naplanovane}">
                        <td th:text="${zapas.datumCas != null ? #temporals.format(zapas.datumCas, 'd. M. yyyy HH:mm') : '—'}"></td>
                        <td th:text="${zapas.domaciTym.univerzita.zkratka}"></td>
                        <td th:text="${zapas.hosteTym.univerzita.zkratka}"></td>
                        <td th:text="${zapas.mistoKonani != null ? zapas.mistoKonani.nazev : '—'}"></td>
                        <td class="admin-table__actions">
                            <a th:href="@{/admin/zapasy/{id}/vysledek(id=${zapas.id})}" class="admin-btn-edit">Zapsat výsledek</a>
                            <form th:action="@{/admin/zapasy/{id}/smazat(id=${zapas.id})}" method="post"
                                  onsubmit="return confirm('Smazat zápas?')">
                                <button type="submit" class="admin-btn-delete">Smazat</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${naplanovane == null || #lists.isEmpty(naplanovane)}">
                        <td colspan="5" class="admin-table__empty">Žádné naplánované zápasy.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <h2 class="admin-section-title">Odehrané zápasy</h2>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                    <tr><th>Datum</th><th>Domácí</th><th>Skóre</th><th>Hosté</th><th>Akce</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="zapas : ${odehrane}">
                        <td th:text="${zapas.datumCas != null ? #temporals.format(zapas.datumCas, 'd. M. yyyy') : '—'}"></td>
                        <td th:text="${zapas.domaciTym.univerzita.zkratka}"></td>
                        <td th:text="${zapas.domaciSkore} + ' : ' + ${zapas.hosteSkore}"></td>
                        <td th:text="${zapas.hosteTym.univerzita.zkratka}"></td>
                        <td class="admin-table__actions">
                            <a th:href="@{/admin/zapasy/{id}/vysledek(id=${zapas.id})}" class="admin-btn-edit">Opravit</a>
                            <form th:action="@{/admin/zapasy/{id}/smazat(id=${zapas.id})}" method="post"
                                  onsubmit="return confirm('Smazat zápas?')">
                                <button type="submit" class="admin-btn-delete">Smazat</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
</body>
</html>
