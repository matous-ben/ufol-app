<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">

<!-- Shared head fragment -->
<head th:replace="~{fragments/admin-layout :: head(title='Zapsat výsledek')}"></head>

<body class="admin-body">
<div class="admin-layout">

    <!-- Sidebar fragment -->
    <aside th:replace="~{fragments/admin-layout :: sidebar}"></aside>

    <!-- Main content -->
    <div class="admin-main">

        <!-- Top bar fragment -->
        <header th:replace="~{fragments/admin-layout :: topbar}"></header>

        <div class="admin-content admin-content--centered">
            <div class="admin-form-card admin-form-card--wide">
                <div th:if="${error}" class="admin-alert admin-alert--error" th:text="${error}"></div>

                <div class="match-result-display">
                    <span th:text="${zapas.domaciTym.univerzita.zkratka}" class="result-team">Domácí</span>
                    <span class="result-vs">vs</span>
                    <span th:text="${zapas.hosteTym.univerzita.zkratka}" class="result-team">Hosté</span>
                </div>

                <form th:action="@{/admin/zapasy/{id}/vysledek(id=${zapas.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="result-inputs">
                        <div class="form-group">
                            <label th:text="${zapas.domaciTym.univerzita.zkratka}">Domácí</label>
                            <input type="number" name="domaciSkore" min="0"
                                   th:value="${zapas.domaciSkore}" required>
                        </div>
                        <span class="result-separator">:</span>
                        <div class="form-group">
                            <label th:text="${zapas.hosteTym.univerzita.zkratka}">Hosté</label>
                            <input type="number" name="hosteSkore" min="0"
                                   th:value="${zapas.hosteSkore}" required>
                        </div>
                    </div>

                    <h2 class="admin-section-title">Soupisky (volitelné)</h2>
                    <div class="result-lineups">
                        <div class="result-lineup">
                            <h3 th:text="${zapas.domaciTym.univerzita.zkratka}">DOM</h3>
                            <div th:each="registrace : ${domaciRegistrace}" class="result-lineup__item">
                                <label>
                                    <input type="checkbox"
                                           name="registraceIds"
                                           th:value="${registrace.id}"
                                           th:checked="${selectedRegistraceIds.contains(registrace.id)}">
                                    <span th:text="${registrace.hrac.prijmeni + ' ' + registrace.hrac.jmeno}">Novák Jan</span>
                                </label>
                                <input type="number"
                                       min="0"
                                       th:name="${'goly_' + registrace.id}"
                                       th:value="${golyMap.getOrDefault(registrace.id, 0)}"
                                       class="result-lineup__goals"
                                       placeholder="Góly">
                            </div>
                        </div>

                        <div class="result-lineup">
                            <h3 th:text="${zapas.hosteTym.univerzita.zkratka}">HOS</h3>
                            <div th:each="registrace : ${hosteRegistrace}" class="result-lineup__item">
                                <label>
                                    <input type="checkbox"
                                           name="registraceIds"
                                           th:value="${registrace.id}"
                                           th:checked="${selectedRegistraceIds.contains(registrace.id)}">
                                    <span th:text="${registrace.hrac.prijmeni + ' ' + registrace.hrac.jmeno}">Novák Jan</span>
                                </label>
                                <input type="number"
                                       min="0"
                                       th:name="${'goly_' + registrace.id}"
                                       th:value="${golyMap.getOrDefault(registrace.id, 0)}"
                                       class="result-lineup__goals"
                                       placeholder="Góly">
                            </div>
                        </div>
                    </div>

                    <div class="admin-form-actions">
                        <button type="submit" class="btn">Uložit výsledek</button>
                        <a th:href="@{/admin/zapasy}" class="btn btn--outline">Zrušit</a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
