<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-layout :: head(title='Hráči')}"></head>

<body class="admin-body">
<div class="admin-layout">
    <aside th:replace="~{fragments/admin-layout :: sidebar}"></aside>

    <div class="admin-main">
        <header th:replace="~{fragments/admin-layout :: topbar}"></header>

        <div class="admin-content">
            <div class="admin-list-header">
                <h1 class="admin-page-title">Hráči</h1>
            </div>

            <div th:if="${success}" class="admin-alert admin-alert--success" th:text="${success}"></div>
            <div th:if="${error}" class="admin-alert admin-alert--error" th:text="${error}"></div>

            <div class="admin-form-card">
                <form th:action="@{/admin/hraci/novy}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="form-group">
                        <label for="jmeno">Jméno</label>
                        <input id="jmeno" name="jmeno" type="text" required>
                    </div>

                    <div class="form-group">
                        <label for="prijmeni">Příjmení</label>
                        <input id="prijmeni" name="prijmeni" type="text" required>
                    </div>

                    <div class="form-group">
                        <label for="datumNarozeni">Datum narození (volitelné)</label>
                        <input id="datumNarozeni" name="datumNarozeni" type="date">
                    </div>

                    <div class="form-group">
                        <label for="tymId">Tým</label>
                        <select id="tymId" name="tymId" required>
                            <option value="">-- vyberte --</option>
                            <option th:each="tym : ${tymy}"
                                    th:value="${tym.id}"
                                    th:selected="${selectedTymId != null && selectedTymId == tym.id}"
                                    th:text="${tym.univerzita.zkratka + ' - ' + tym.nazev}">
                            </option>
                        </select>
                    </div>

                    <div class="admin-form-actions">
                        <button type="submit" class="btn">Přidat hráče</button>
                    </div>
                </form>
            </div>

            <h2 class="admin-section-title">Filtrovat soupisku týmu</h2>
            <form th:action="@{/admin/hraci}" method="get" class="admin-form-card">
                <div class="form-group">
                    <label for="filterTymId">Tým</label>
                    <select id="filterTymId" name="tymId" required>
                        <option value="">-- vyberte --</option>
                        <option th:each="tym : ${tymy}"
                                th:value="${tym.id}"
                                th:selected="${selectedTymId != null && selectedTymId == tym.id}"
                                th:text="${tym.univerzita.zkratka + ' - ' + tym.nazev}">
                        </option>
                    </select>
                </div>
                <div class="admin-form-actions">
                    <button type="submit" class="btn">Zobrazit hráče</button>
                </div>
            </form>

            <h2 class="admin-section-title">Výsledek filtru</h2>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>Hráč</th>
                        <th>Datum narození</th>
                        <th>Zápasy</th>
                        <th>Góly</th>
                        <th>Akce</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row, stat : ${hracStats}" th:classappend="${stat.even} ? ' admin-table__row--zebra' : ''">
                        <td th:text="${row.registrace().hrac.prijmeni + ' ' + row.registrace().hrac.jmeno}">Novák Jan</td>
                        <td th:text="${row.registrace().hrac.datumNarozeni != null ? #temporals.format(row.registrace().hrac.datumNarozeni, 'd. M. yyyy') : '—'}">—</td>
                        <td th:text="${row.odehraneZapasy()}">0</td>
                        <td th:text="${row.goly()}">0</td>
                        <td class="admin-table__actions">
                            <form th:action="@{/admin/hraci/{id}/smazat(id=${row.registrace().hrac.id})}" method="post"
                                  onsubmit="return confirm('Opravdu odebrat hráče včetně registrací?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="tymId" th:value="${selectedTymId}">
                                <button type="submit" class="admin-btn-delete">Odebrat</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(hracStats)}">
                        <td colspan="5" class="admin-table__empty">Pro vybraný tým zatím nejsou hráči.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
