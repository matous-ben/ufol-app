<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení | UFoL</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap"
          rel="stylesheet">
</head>
<body>

<div class="login-page">

    <div class="login-topbar">
        <a th:href="@{/}">
            <img class="header__logo" th:src="@{/images/logo.svg}" alt="UFoL Logo">
        </a>
        <a th:href="@{/}" class="login-back">← Zpět na hlavní stránku</a>
    </div>

    <div class="login-container">
        <div class="login-card">
            <h1>Přihlášení do administrace</h1>
            <p class="login-subtitle">Pouze pro administrátory ligy</p>

            <div th:if="${param.error}" class="login-error">
                Nesprávný e-mail nebo heslo.
            </div>

            <div th:if="${param.sessionExpired}" class="login-error">
                Vaše relace vypršela. Přihlaste se prosím znovu.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">E-mail</label>
                    <input type="email"
                           id="username"
                           name="username"
                           placeholder="Zadejte e-mail"
                           required
                           autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Heslo</label>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Zadejte heslo"
                           required
                           autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn--full">
                    Přihlásit se
                </button>
            </form>
        </div>
    </div>

</div>
</body>
</html>
