<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Týmy', 'Přehled týmů v Univerzitní fotbalové lize UFoL')}"></head>

<body>

        <!-- Include the header fragment from layout.html -->
        <header th:replace="~{fragments/layout :: header}"></header>

        <main>
    <section class="team-detail">
        <div class="team-detail__content">

            <!-- Back link -->
            <a th:href="@{/tymy}" class="team-detail__back">← Zpět na přehled týmů</a>

            <!-- Team hero card -->
            <div class="team-detail__hero">
                <div class="team-detail__logo-wrapper">
                    <img class="team-detail__logo"
                         th:src="@{'/images/teams/' + ${tym.univerzita.logoFile}}"
                         th:alt="${tym.nazev} + ' logo'"
                         loading="lazy">
                </div>
                <div class="team-detail__info">
                    <h1 class="team-detail__name" th:text="${tym.univerzita.zkratka}">UHK</h1>
                    <p class="team-detail__university" th:text="${tym.univerzita.nazev}">
                        Univerzita Hradec Králové
                    </p>

                    <span class="team-detail__status team-detail__status--active"
                          th:if="${tym.aktivni}">
                        Aktivní tým
                    </span>
                    <span class="team-detail__status team-detail__status--inactive"
                          th:if="${!tym.aktivni}">
                        Neaktivní tým
                    </span>
                </div>
            </div>

            <!-- Roster section -->
            <div class="team-detail__section">
                <h2 class="team-detail__section-title">Soupiska hráčů</h2>

                <!-- Active roster -->
                <div th:if="${not #lists.isEmpty(hracStats)}" class="standings__table-content">
                    <table class="league-table">
                        <thead>
                        <tr class="league-table__header-row">
                            <th class="league-table__th">#</th>
                            <th class="league-table__th league-table__th--team">Hráč</th>
                            <th class="league-table__th">Datum narození</th>
                            <th class="league-table__th">Zápasy</th>
                            <th class="league-table__th">Góly</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="row, stat : ${hracStats}"
                            class="league-table__row"
                            th:classappend="${stat.even ? 'league-table__row--zebra' : ''}">

                            <td class="league-table__cell league-table__cell--pos"
                                th:text="${stat.count}">1</td>

                            <td class="league-table__cell league-table__cell--team">
                                <div class="league-table__team-content">
                                        <span class="league-table__name"
                                              th:text="${row.registrace().hrac.prijmeni + ' ' + row.registrace().hrac.jmeno}">
                                            Novák Jan
                                        </span>
                                </div>
                            </td>

                            <td class="league-table__cell"
                                th:text="${row.registrace().hrac.datumNarozeni != null ? #temporals.format(row.registrace().hrac.datumNarozeni, 'd. M. yyyy') : '—'}">
                                1. 1. 2000
                            </td>
                            <td class="league-table__cell" th:text="${row.odehraneZapasy()}">0</td>
                            <td class="league-table__cell" th:text="${row.goly()}">0</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Empty state -->
                <div th:if="${#lists.isEmpty(hracStats)}" class="team-detail__empty">
                    <p>Soupiska pro aktuální ročník zatím není k dispozici.</p>
                </div>
            </div>
        </div>

    </section>
</main>

        <footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
