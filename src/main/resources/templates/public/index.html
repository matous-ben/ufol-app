<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Univerzitní fotbalová liga - oficiální portál UFoL s aktuálními zápasy, tabulkou a týmy" />

        <title>Univerzitní fotbalová liga | UFoL</title>
        <link rel="icon" th:href="@{/images/favicon-ufol.png}" />

        <!-- Optimized font loading - non-blocking -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap"
            rel="stylesheet"
            media="print"
            onload="this.media='all'"
        />
        <noscript>
            <link
                href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap"
                rel="stylesheet"
            />
        </noscript>
        
        <!-- Main styles -->
        <link rel="stylesheet" th:href="@{/css/main.css}" />
        
        <!-- JavaScript for responsive menu navigation -->
        <script th:src="@{/js/script.js}" defer></script>
    </head>

    <body>

        <!-- Include the header fragment from layout.html -->
        <header th:replace="~{fragments/layout :: header}"></header>

        <main>
            <section class="hero">
                <div class="hero__content">
                    <h1>Univerzitní fotbalová liga</h1>
                    <p class="hero__subtitle">Vítejte na oficiálním portálu UFoL</p>
                    <a th:href="@{/tabulka}" class="btn btn-primary">Zobrazit tabulku</a>
                </div>
            </section>

            <section class="upcoming-matches">
                <div class="upcoming-matches__content">
                    <div class="section__header">
                        <h2>Příští zápasy</h2>
                        <a th:href="@{/zapasy}">Zobrazit vše</a>
                    </div>
    
                    <div class="upcoming-matches__list">
                        <div class="match-card">
                            <div class="match-card__team">
                                <a href="#"><img class="match-card__logo" src="./images/logos/upce.webp" alt="Home Team Logo" loading="lazy"></a>
                                <a href="#"><h3 class="match-card__name">UPCE</h3></a>
                            </div>
                            <div class="match-card__info">
                                <span class="match-card__time">15:00</span>
                                <time class="match-card__date" datetime="2025-11-24">24. 11. 2025</time>
                            </div>
                            <div class="match-card__team">
                                <a href="#"><h3 class="match-card__name">UHK</h3></a>
                                <a href="#"><img class="match-card__logo" src="./images/logos/uhk.webp" alt="Away Team Logo" loading="lazy"></a>
                            </div>
                        </div>
                        <div class="match-card">
                            <div class="match-card__team">
                                <a href="#"><img class="match-card__logo" src="./images/logos/muni.webp" alt="Home Team Logo" loading="lazy"></a>
                                <a href="#"><h3 class="match-card__name">MUNI</h3></a>
                            </div>
                            <div class="match-card__info">
                                <span class="match-card__time">14:00</span>
                                <time class="match-card__date" datetime="2025-11-24">25. 11. 2025</time>
                            </div>
                            <div class="match-card__team">
                                <a href="#"><h3 class="match-card__name">UK</h3></a>
                                <a href="#"><img class="match-card__logo" src="./images/logos/uk.webp" alt="Away Team Logo" loading="lazy"></a>
                            </div>
                        </div>
                        <div class="match-card">
                            <div class="match-card__team">
                                <a href="#"><img class="match-card__logo" src="./images/logos/cvut.webp" alt="Home Team Logo" loading="lazy"></a>
                                <a href="#"><h3 class="match-card__name">ČVUT</h3></a>
                            </div>
                            <div class="match-card__info">
                                <span class="match-card__time">16:00</span>
                                <time class="match-card__date" datetime="2025-11-24">30. 11. 2025</time>
                            </div>
                            <div class="match-card__team">
                                <a href="#"><h3 class="match-card__name">UPOL</h3></a>
                                <a href="#"><img class="match-card__logo" src="./images/logos/upol.webp" alt="Away Team Logo" loading="lazy"></a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="standings">
                <div class="standings__content">
                    <div class="section__header">
                        <h2>Tabulka ligy</h2>
                        <a th:href="@{/tabulka}">Zobrazit celou</a>
                    </div>
                    <div class="standings__table-content">
                        <table class="league-table--mini">
                            <thead>
                                <tr class="league-table__header-row">
                                    <th class="league-table__th league-table__th--pos">Poz.</th>
                                    <th class="league-table__th league-table__th--team">Klub</th>
                                    <th class="league-table__th">Z</th>
                                    <th class="league-table__th">Body</th>
                                </tr>
                            </thead>

                            <tbody>
                                <tr th:each="row, stat : ${standings}"
                                    class="league-table__row" th:classappend="${stat.even} ? ' league-table__row--zebra' : ''">

                                    <td class="league-table__cell league-table__cell--pos"
                                    th:text="${stat.count} + '.'">1.</td>

                                    <td class="league-table__cell league-table__cell--team">
                                        <div class="league-table__team-content">
                                            <img class="league-table__logo"
                                                 th:src="@{'/images/teams/' + ${row.logoFile}}"
                                                 th:alt="${row.nazevTymu}"
                                                 loading="lazy">
                                            <span class="league-table__name" th:text="${row.nazevTymu}">VŠTE</span>
                                        </div>
                                    </td>

                                    <td class="league-table__cell" th:text="${row.odehrane}">7</td>
                                    <td class="league-table__cell" th:text="${row.body}">19</td>
                                </tr>

                                <!-- Zobrazi se pouze pokud je list s tabulkou prazdny -->
                                <tr th:if="${#lists.isEmpty(standings)}">
                                    <td colspan="4" style="text-align: center; padding: 1rem; color: var(--color-text-subtle);">
                                        Sezóna zatím nezačala
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <!-- Include the footer fragment from layout.html -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>

    </body>
</html>
